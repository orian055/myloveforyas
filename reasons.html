<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --rose: #e8406a; --rose-light: #ff7096;
            --gold: #d4a843; --gold-light: #f0c96a;
            --cream: #fff5f7; --deep: #1a0610; --soft-pink: #f9c4d4;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh; min-height: 100dvh;
            font-family: 'Cormorant Garamond', serif;
            background:
                radial-gradient(ellipse at 15% 25%, rgba(158,26,58,0.28) 0%, transparent 50%),
                radial-gradient(ellipse at 85% 75%, rgba(74,14,32,0.35) 0%, transparent 45%),
                linear-gradient(160deg, #1a0610 0%, #2d0a1a 40%, #1a0610 100%);
            color: var(--cream); overflow-x: hidden;
        }
        .petal {
            position: fixed; pointer-events: none;
            animation: petalFall linear infinite; z-index: 0; opacity: 0.4;
        }
        @keyframes petalFall {
            0% { transform: translateY(-40px) rotate(0deg); opacity: 0.5; }
            100% { transform: translateY(105vh) rotate(540deg) translateX(25px); opacity: 0; }
        }
        .page-wrap {
            min-height: 100vh; min-height: 100dvh;
            display: flex; align-items: center; justify-content: center;
            padding: 28px 16px; position: relative; z-index: 1;
        }
        .card {
            width: min(720px, 100%);
            padding: 48px 48px 40px;
            border-radius: 4px;
            background: rgba(22, 5, 14, 0.88);
            border: 1px solid rgba(212,168,67,0.2);
            box-shadow: 0 50px 120px rgba(0,0,0,0.6), inset 0 1px 0 rgba(212,168,67,0.12);
            backdrop-filter: blur(28px);
            text-align: center; position: relative; overflow: hidden;
            animation: cardIn 0.8s ease forwards;
        }
        @keyframes cardIn { from { opacity:0; transform:translateY(40px); } to { opacity:1; transform:translateY(0); } }
        .card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), var(--rose-light), var(--gold), transparent);
            background-size: 200% 100%; animation: shimmer 3s linear infinite;
        }
        @keyframes shimmer { from { background-position:200% 0; } to { background-position:-200% 0; } }

        .eyebrow {
            font-family: 'Dancing Script', cursive; font-size: 1.2rem;
            color: var(--gold-light); letter-spacing: 0.08em; margin-bottom: 8px;
            opacity: 0; animation: slideUp 0.7s ease 0.2s forwards;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 5vw, 3.4rem); font-weight: 700;
            color: var(--cream); letter-spacing: -0.02em; line-height: 1.05;
            opacity: 0; animation: slideUp 0.7s ease 0.35s forwards;
        }
        h1 em { font-style: italic; color: var(--rose-light); }
        .gold-line {
            width: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 14px auto; animation: expandLine 1s ease 0.8s forwards;
        }
        @keyframes expandLine { to { width: 100px; } }
        .sub {
            font-size: 1rem; color: rgba(249,196,212,0.75); font-style: italic;
            font-weight: 300; letter-spacing: 0.04em; margin-bottom: 24px;
            opacity: 0; animation: slideUp 0.7s ease 0.5s forwards;
        }

        /* Reason stage — swipeable */
        .reason-stage {
            position: relative; margin: 0 auto 16px;
            min-height: 120px;
            background: rgba(255,255,255,0.025);
            border: 1px solid rgba(212,168,67,0.12); border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            padding: 24px 28px; overflow: hidden;
            opacity: 0; animation: slideUp 0.7s ease 0.65s forwards;
            cursor: grab; user-select: none;
        }
        .reason-stage:active { cursor: grabbing; }
        .reason-stage::before {
            content: '\201C';
            position: absolute; top: -8px; left: 14px;
            font-family: 'Playfair Display', serif; font-size: 5rem;
            color: rgba(212,168,67,0.08); line-height: 1; pointer-events: none;
        }
        .reason-text {
            font-family: 'Playfair Display', serif; font-style: italic;
            font-size: clamp(1rem, 3.5vw, 1.2rem); color: var(--soft-pink);
            line-height: 1.7; position: relative; z-index: 1;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }
        .reason-text.exit-left  { opacity: 0; transform: translateX(-24px); }
        .reason-text.exit-right { opacity: 0; transform: translateX(24px); }
        .reason-text.enter      { opacity: 0; }
        .reason-text.visible    { opacity: 1; transform: translateX(0); }

        /* swipe hint */
        .swipe-hint {
            font-size: 0.75rem; color: rgba(212,168,67,0.35);
            letter-spacing: 0.08em; margin-bottom: 8px;
            opacity: 0; animation: slideUp 0.7s ease 0.75s forwards;
        }

        /* progress */
        .progress-bar {
            width: 100%; height: 2px; background: rgba(255,255,255,0.06);
            border-radius: 2px; margin-bottom: 0; overflow: hidden;
        }
        .progress-fill {
            height: 100%; background: linear-gradient(90deg, var(--rose), var(--gold));
            border-radius: 2px; transition: width 0.4s ease;
        }

        /* nav */
        .slider-nav {
            display: flex; align-items: center; justify-content: center;
            gap: 18px; margin: 14px 0 0;
            opacity: 0; animation: slideUp 0.7s ease 0.8s forwards;
        }
        .nav-btn {
            width: 46px; height: 46px; border-radius: 50%;
            border: 1px solid rgba(212,168,67,0.3); background: rgba(212,168,67,0.06);
            color: var(--gold-light); font-size: 1rem; cursor: pointer;
            transition: all 0.25s ease; display: flex; align-items: center; justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }
        .nav-btn:active { transform: scale(0.92); background: rgba(212,168,67,0.15); }
        .nav-btn:hover { background: rgba(212,168,67,0.14); border-color: var(--gold); transform: scale(1.08); }
        .counter { font-size: 0.85rem; color: rgba(212,168,67,0.5); letter-spacing: 0.12em; min-width: 60px; text-align: center; }
        .shuffle-btn {
            width: 46px; height: 46px; border-radius: 50%;
            border: 1px solid rgba(232,64,106,0.25); background: rgba(232,64,106,0.05);
            color: rgba(255,112,150,0.7); font-size: 1rem; cursor: pointer;
            transition: all 0.25s ease; display: flex; align-items: center; justify-content: center;
            -webkit-tap-highlight-color: transparent; title: "shuffle";
        }
        .shuffle-btn:hover { background: rgba(232,64,106,0.12); border-color: var(--rose-light); color: var(--rose-light); transform: rotate(180deg) scale(1.08); }
        .shuffle-btn:active { transform: rotate(180deg) scale(0.92); }

        .back-btn {
            margin-top: 22px; padding: 12px 32px; border-radius: 2px;
            border: 1px solid rgba(212,168,67,0.3); background: transparent;
            color: var(--gold-light); font-family: 'Cormorant Garamond', serif;
            font-size: 0.95rem; font-style: italic; letter-spacing: 0.1em;
            cursor: pointer; transition: all 0.3s ease;
            opacity: 0; animation: slideUp 0.7s ease 1s forwards;
            -webkit-tap-highlight-color: transparent;
        }
        .back-btn:hover { border-color: var(--gold); color: var(--cream); background: rgba(212,168,67,0.08); transform: translateY(-2px); }
        @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

        /* mobile tweaks */
        @media (max-width: 500px) {
            .card { padding: 32px 20px 28px; }
            .reason-stage { padding: 20px 20px; min-height: 100px; }
        }
    </style>
</head>
<body>
    <div id="petals"></div>
    <div class="page-wrap">
        <div class="card">
            <div class="eyebrow">&#8212; from the heart &#8212;</div>
            <h1>Reasons I <em>Love</em> You</h1>
            <div class="gold-line"></div>
            <p class="sub">Every single one is true.</p>

            <div class="reason-stage" id="stage">
                <div class="reason-text visible" id="reasonText">Your laugh brightens every day.</div>
            </div>
            <p class="swipe-hint">&#8592; swipe or tap arrows &#8594;</p>

            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width:1%"></div>
            </div>

            <div class="slider-nav">
                <button class="nav-btn" onclick="go(-1)" aria-label="previous">&#8592;</button>
                <span class="counter" id="counter">1 / 80</span>
                <button class="nav-btn" onclick="go(1)" aria-label="next">&#8594;</button>
                <button class="shuffle-btn" onclick="shuffle()" title="shuffle" aria-label="shuffle">&#8645;</button>
            </div>

            <br>
            <button class="back-btn" onclick="location.href='/Yas'">&#8592; return home</button>
        </div>
    </div>

    <script>
        const reasons = [
            "You actually care.",
            "You make me feel loved.",
            "Youre soooo coollll.",
            "your smile is cutee.",
            "Your very smart.",
            "Youre humble (even tho you got crazy skills).",
            "Youre a nice person.",
            "You are prettyyyyyy.",
            "Your humor is cool!",
            "Your HOT. Like damn.",
            "You make me cool things!",
            "Hugging you feels like heaven.",
            "You always smell so good!",
            "You are very talented.",
            "Your voice.",
            "Your eyes are the most beautiful thing ive ever seen.",
            "Your laugh is cutee.",
            "You are smol!",
            "Youre going through so much and you still smile!",
            "Youre addicting.",
            "You. (Just you.)",
            "Youre PERFECT.",
            "You have cool stories!",
            "You listen to my nonsense.",
            "You are fun!",
            "You taste good!",
            "Youre just CUTE!",
            "You are a good mom to tayra.",
            "I KNOW HOW TO WRITE TAYRA IN ENGLISH BE PROUD OF ME!",
            "You make me want to be better for you.",
            "You make me happy.",
            "The way you look at me.",
            "Youre literally a princess!",
            "You have a Beautiful accent (sorry).",
            "You make me feel like a kid again!",
            "That one time you walked into my class and put your hand on my head.",
            "Your hugs.",
            "The way you smoke.",
            "Your BELLY.",
            "The way you make me laugh!",
            "Your confidence (sometimes!)",
            "Your kisses.",
            "Your HAIR.",
            "I can be myself around you.",
            "The intense feelings you give me.",
            "The random pics you send me (NEVER STOP).",
            "Your ability to backflip.",
            "The way you comfort me without words.",
            "Your vibe.",
            "YOU ARE SMOL.",
            "Your ability to play acoustic guitar (WITHOUT A PICK!!!)",
            "The way you make my heart race just by existing.",
            "SMOL PRINCESS.",
            "How youre shy and carefree AT THE SAME TIME.",
            "YOUR SMOL HANDS.",
            "The way you shove stuff in my mouth (DONT STOPPPPP).",
            "YOUR EYES OMGGGGGGGG.",
            "How you hit me.",
            "Youre sooooo beautifulllll!!!!!!!!!",
            "DID I MENTION YOURE SMOL?!",
            "Your pijamas are sooo cuteeeeeeeeeeee.",
            "How you pronounce words (its adorable).",
            "Youre strong (but smol).",
            "The way you say my name!",
            "Youre tongue.",
            "Your ability to be angry then calm down instantly.",
            "YOUR HUGSSSSS AHHHHH.",
            "The fact you say im a small cat (im a grown ass man).",
            "Your determination. (its inspiring)",
            "you.",
            "yeah you.",
            "The way i just meet you in random places.",
            "Your smalllllllll!!!!",
            "'btw ily'",
            "Your awesome minecraft builds.",
            "The way you talk is so cute im just feoithhgahga.",
            "Your silly!",
            "Youre pretty (and small).",
            "Your depth and complexity.",
            "I DO INFACT tell you now."
        ];

        let idx = 0;
        const textEl = document.getElementById('reasonText');
        const counterEl = document.getElementById('counter');
        const fillEl = document.getElementById('progressFill');

        function updateDisplay(dir) {
            const exitClass = dir >= 0 ? 'exit-left' : 'exit-right';
            textEl.classList.remove('visible','enter','exit-left','exit-right');
            textEl.classList.add(exitClass);
            setTimeout(() => {
                textEl.textContent = reasons[idx];
                textEl.classList.remove(exitClass);
                textEl.classList.add('enter');
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => textEl.classList.add('visible'));
                });
                counterEl.textContent = (idx+1) + ' / ' + reasons.length;
                fillEl.style.width = ((idx+1)/reasons.length*100) + '%';
            }, 200);
        }

        function go(dir) {
            idx = (idx + dir + reasons.length) % reasons.length;
            updateDisplay(dir);
        }

        function shuffle() {
            const prev = idx;
            do { idx = Math.floor(Math.random() * reasons.length); } while (idx === prev && reasons.length > 1);
            updateDisplay(1);
        }

        // keyboard
        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowRight') go(1);
            if (e.key === 'ArrowLeft') go(-1);
        });

        // touch swipe
        let tx0 = null;
        const stage = document.getElementById('stage');
        stage.addEventListener('touchstart', e => { tx0 = e.touches[0].clientX; }, { passive: true });
        stage.addEventListener('touchend', e => {
            if (tx0 === null) return;
            const dx = e.changedTouches[0].clientX - tx0;
            if (Math.abs(dx) > 40) go(dx < 0 ? 1 : -1);
            tx0 = null;
        });

        updateDisplay(1);

        // petals
        const pc = document.getElementById('petals');
        const ps = ['\u2665','\u2661','\u2764','\u273F'];
        const pc_colors = ['#e8406a','#d4a843','#ff7096'];
        function sp() {
            const p = document.createElement('div'); p.className = 'petal';
            p.textContent = ps[Math.floor(Math.random()*ps.length)];
            p.style.left = Math.random()*100 + 'vw';
            p.style.color = pc_colors[Math.floor(Math.random()*pc_colors.length)];
            p.style.fontSize = (0.7+Math.random()*1.1)+'rem';
            p.style.animationDuration = (7+Math.random()*9)+'s';
            p.style.animationDelay = (Math.random()*3)+'s';
            pc.appendChild(p); setTimeout(()=>p.remove(),16000);
        }
        setInterval(sp,1200);
        for(let i=0;i<5;i++) setTimeout(sp,i*400);
    </script>
</body>
</html>
