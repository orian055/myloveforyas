<html>
<head>
    <style>
        * { box-sizing: border-box; }
        body {
            min-height: 100vh;
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            color: #f7e7ff;
            background: linear-gradient(135deg, #30042d 0%, #461362 45%, #a11d7d 100%);
            overflow-x: hidden;
        }
        .page-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }
        .card {
            width: min(720px, 100%);
            padding: 44px 44px 32px;
            border-radius: 32px;
            background: rgba(30, 9, 43, 0.88);
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.38);
            text-align: center;
            color: #ffd0f8;
        }
        h1 { margin-top: 0; font-size: clamp(3rem, 5vw, 4.4rem); }
        p { font-size: 1.1rem; line-height: 1.8; color: rgba(255,210,245,0.94); }
        .slider-container {
            position: relative;
            max-width: 620px;
            margin: 28px auto 0;
            height: 160px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .reason-text {
            text-align: center;
            font-size: 1.15rem;
            color: rgba(255,210,245,0.94);
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .slider-nav {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 16px;
        }
        .nav-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.18);
            background: rgba(255,255,255,0.08);
            color: #ffd6ff;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.25s ease;
        }
        .nav-btn:hover {
            background: rgba(255,255,255,0.14);
            transform: scale(1.08);
        }
        .counter { font-size: 0.9rem; color: rgba(255,210,245,0.7); margin-top: 12px; }
        .back-btn { margin-top: 28px; padding: 14px 18px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.18); background: rgba(255,255,255,0.08); color: #ffd6ff; cursor: pointer; }
    </style>
</head>
<body>
