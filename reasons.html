        .slider-container {
            position: relative;
            max-width: 620px;
            margin: 28px auto 0;
            height: 160px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 20px;

            color: rgba(255,210,245,0.94);
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .slider-nav {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 16px;

        .nav-btn {

            background: rgba(255,255,255,0.08);
            color: #ffd6ff;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.25s ease;
        }
        .nav-btn:hover {
            background: rgba(255,255,255,0.14);
            transform: scale(1.08);
        }
        .counter { font-size: 0.9rem; color: rgba(255,210,245,0.7); margin-top: 12px; }
        .back-btn { margin-top: 28px; padding: 14px 18px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.18); background: rgba(255,255,255,0.08); color: #ffd6ff; cursor: pointer; }
