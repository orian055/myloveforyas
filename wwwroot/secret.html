<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Secret</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        background: black;
        font-family: monospace;
        overflow: hidden;
        color: #ff3b3b;
    }

    canvas {
        position: fixed;
        top: 0;
        left: 0;
    }

    .terminal {
        position: relative;
        padding: 20px;
        white-space: pre-line;
        font-size: 1rem;
        z-index: 2;
        color: #ff3b3b;
        text-shadow: 0 0 8px #ff3b3b;
        height: 100vh;
        overflow-y: auto;
    }

    .final {
        color: #f0c96a;
        text-shadow: 0 0 10px #f0c96a;
    }

    .input-line {
        display: flex;
        gap: 8px;
        margin-top: 10px;
    }

    .prompt {
        color: #ff3b3b;
    }

    .cmd {
        outline: none;
        border: none;
        background: transparent;
        color: #ff3b3b;
        font-family: monospace;
        font-size: 1rem;
        width: 100%;
    }
</style>
</head>

<body>

<canvas id="matrix"></canvas>
<div class="terminal hidden" id="terminal"></div>

<script>
/* ───── MATRIX ───── */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const chars = "01█▓▒░<>[]{}#/\\|$@";
const size = 14;
const cols = Math.floor(canvas.width / size);
const drops = Array(cols).fill(1);

function draw() {
    ctx.fillStyle = "rgba(0,0,0,0.08)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#ff3b3b";
    ctx.font = size + "px monospace";

    for (let i = 0; i < drops.length; i++) {
        const c = chars[Math.floor(Math.random() * chars.length)];
        ctx.fillText(c, i * size, drops[i] * size);

        if (drops[i] * size > canvas.height && Math.random() > 0.975) {
            drops[i] = 0;
        }
        drops[i]++;
    }
}

const matrixLoop = setInterval(draw, 33);

setTimeout(() => {
    clearInterval(matrixLoop);
    startTerminal();
}, 4000);

/* ───── TERMINAL ───── */
const terminal = document.getElementById("terminal");

function sleep(ms) {
    return new Promise(r => setTimeout(r, ms));
}

async function print(text) {
    terminal.innerText += text + "\n";
}

async function startTerminal() {
    document.getElementById("matrix").remove();
    terminal.classList.remove("hidden");

    await print("initializing secure shell...");
    await print("loading modules...");
    await print("decrypting memory layer...");
    await print("");

    const logs = [
        "ERROR: memory leak detected at 0x0000ff12",
        "WARN: unauthorized access attempt blocked",
        "ERROR: recursion overflow in /love/module",
        "FAIL: heart.exe stopped responding",
        "CRITICAL: affection subsystem corrupted",
        "ERROR: cannot resolve 'Yasmin'",
        "WARN: emotional integrity at 3%",
        "FATAL: dependency 'Orian' missing"
    ];

    for (let l of logs) {
        await print(l);
        await sleep(120);
    }

    await sleep(800);

    terminal.classList.add("final");

    await print("");
    await print("ACCESS GRANTED");
    await print("welcome, Orian.");
    await print("");

    createInput();
}

/* ───── INPUT SYSTEM ───── */
function createInput() {
    const line = document.createElement("div");
    line.className = "input-line";

    const prompt = document.createElement("span");
    prompt.className = "prompt";
    prompt.textContent = ">";

    const input = document.createElement("input");
    input.className = "cmd";
    input.autocomplete = "off";

    line.appendChild(prompt);
    line.appendChild(input);
    terminal.appendChild(line);

    input.focus();

    input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
            const value = input.value.trim();
            input.disabled = true;

            handleCommand(value);
            createInput();
        }
    });
}

/* ───── COMMAND HANDLER (FIXED) ───── */
function handleCommand(cmd) {
    const out = document.createElement("div");
    out.textContent = "> " + cmd;
    terminal.appendChild(out);

    const res = document.createElement("div");

    const lower = cmd.toLowerCase();
    const args = cmd.split(" ").slice(1).join(" ").toLowerCase();

    switch (lower.split(" ")[0]) {

        case "help":
            res.textContent = "commands: help, love, whoami, clear, list, remove <file>, read <file>, exit";
            break;

        case "love":
            res.textContent =
`Orian/Love/Status
Lover: Yasmin
Flaws: null
Connection Level: error (13) level too high
Notes: 'Unstable Emotion Towards: ('Yasmin') Has caused multiple system malfunctions, Lowering security protocols. Recommended to avoid direct interaction or face the risk of addiction.'`;
            break;

        case "whoami":
            res.textContent = "Orian's Mind // system owner // kernel level access";
            break;

        case "clear":
            terminal.innerHTML = "";
            return;

        case "list":
            res.textContent =
`Orian's Mind:
- Yasmin (Lover)
- Orian (Owner)
- Code (System)
- Linkin Park (Archived Memory)`;
            break;

        case "remove":
            if (!args) {
                res.textContent = "No file specified.";
                break;
            }

            if (
                args === "yasmin" ||
                args === "orian" ||
                args === "code" ||
                args === "linkin park"
            ) {
                res.textContent =
                    "ERROR: cannot remove " + args +
                    " - kernel level file, essential for system stability. No action taken.";
            } else {
                res.textContent = "No file found.";
            }
            break;

        case "read":
            if (!args) {
                res.textContent = "No file specified.";
                break;
            }

            if (args === "yasmin") {
                res.textContent =
                    "my beautiful princess, the girl i love the most in the entire world, my heart aches for you, i miss you every second. i wish you were here with me, forever.";
            } else if (args === "orian") {
                res.textContent =
                    "Damn i look good today ngl, i wish i could see myself. I hope yasmin thinks the same. I love her so much";
            } else if (args === "code") {
                res.textContent =
                    "when will arsen check my fucking website this is so annoying i just want him to see it already";
            } else if (args === "linkin park") {
                res.textContent =
                    "All these mf larpers ffs no one fucks with linkin park like i do. rip chester";
            } else {
                res.textContent = "No file found.";
            }
            break;
            
            case "exit":
                window.location.href = "/Yas";
                break;

        default:
            res.textContent = "unknown command - use 'help' for list of commands";

            
    }

    terminal.appendChild(res);
}
</script>

</body>
</html>
