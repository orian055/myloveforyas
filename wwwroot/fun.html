<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1">
    <meta name="theme-color" content="#e8406a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Love Portal">
    <meta name="format-detection" content="telephone=no">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --rose: #e8406a; --rose-light: #ff7096;
            --gold: #d4a843; --gold-light: #f0c96a;
            --cream: #fff5f7; --deep: #1a0610; --soft-pink: #f9c4d4;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body {
            min-height: 100vh; min-height: 100dvh;
            font-family: 'Cormorant Garamond', serif;
            background: radial-gradient(ellipse at 50% 50%, rgba(158,26,58,0.1) 0%, var(--deep) 100%);
            color: var(--cream);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        /* Back Button */
        .back-btn {
            position: absolute; top: 20px; left: 20px;
            background: none; border: none;
            color: var(--gold); font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem; font-style: italic; cursor: pointer;
            z-index: 100;
        }
        
        
        /* Game Layout */
        .game-container {
            display: flex; flex-direction: column; align-items: center;
            width: 100%; max-width: 500px;
            padding: 60px 20px 20px 20px;
            height: 100vh;
        }
        
        /* Score & Main Clicker */
        .score-board { text-align: center; margin-bottom: 30px; z-index: 10; }
        .score-title { font-size: 1.5rem; color: var(--rose-light); font-style: italic; }
        .progress-bar {
    width: 100%;
    height: 10px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    overflow: hidden;
    margin-top: 10px;
}

.progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--rose), var(--gold));
    transition: width 0.2s ease;
}
        .score-number { font-size: 4rem; font-weight: 700; color: var(--gold-light); text-shadow: 0 0 20px rgba(212,168,67,0.4); font-family: 'Playfair Display', serif; }
        .gps-text { font-size: 2.2rem; color: #e8406a99; }

        .main-heart {
            font-size: 8rem;
            cursor: pointer;
            transition: transform 0.05s ease;
            text-shadow: 0 0 40px #e8406a99;
            z-index: 10;
            -webkit-tap-highlight-color: transparent;
        }
        .main-heart:active { transform: scale(0.9); }

        /* Upgrades Section */
        .upgrades-fixed {
    width: 100%;
    margin-top: auto;
    display: flex;
    justify-content: space-between; /* 👈 spread evenly */
    gap: 8px;
    padding: 10px;
}

.upgrade-item {
    flex: 1;                 /* 👈 all take equal space */
    max-width: 20%;          /* 👈 since you have 5 upgrades */
    background: rgba(26,6,16,0.8);
    border: 1px solid rgba(212,168,67,0.3);
    border-radius: 12px;
    padding: 10px;
    cursor: pointer;
    text-align: center;
    transition: 0.2s;
}

.upgrade-item:active {
    transform: scale(0.95);
}

.upgrade-item.disabled {
    opacity: 0.4;
}

.upgrade-item h3 {
    font-size: 1rem;
    color: var(--gold-light);
}

.upgrade-item p {
    font-size: 0.8rem;
    color: #aaa;
}

.upgrade-cost {
    margin-top: 5px;
    color: var(--rose-light);
    font-weight: bold;
}

        #fx-canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 5; }
        #petals { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 1; overflow: hidden; }
        .petal { position: absolute; top: -10vh; color: var(--rose-light); opacity: 0.6; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
        .offline-popup {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(10, 0, 5, 0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
}

.offline-popup.hidden {
    display: none;
}

.offline-box {
    background: rgba(26, 6, 16, 0.95);
    border: 1px solid rgba(212,168,67,0.5);
    border-radius: 20px;
    padding: 30px;
    text-align: center;
    box-shadow: 0 0 40px rgba(232,64,106,0.4);
}

.offline-box h2 {
    font-family: 'Playfair Display', serif;
    color: var(--gold-light);
    margin-bottom: 10px;
}

.offline-box p {
    font-size: 1.8rem;
    color: var(--rose-light);
    margin-bottom: 20px;
}

.offline-box button {
    background: linear-gradient(45deg, var(--rose), var(--rose-light));
    border: none;
    padding: 10px 20px;
    border-radius: 10px;
    color: white;
    font-size: 1rem;
    cursor: pointer;
}
    </style>
</head>
<body>
    <button class="back-btn" onclick="location.href='/Yas'">← return home</button>
    <canvas id="fx-canvas"></canvas>
    <div id="petals"></div>

    <div class="game-container">
        <div class="score-board">
            <div class="score-title" id="score-title">Affection Points</div>
            <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="score-number" id="score">0</div>
            <div class="gps-text"><span id="hps">0</span> hearts per second</div>
        </div>

        <div class="main-heart" id="clicker">❤️</div>

        <div class="upgrades-fixed" id="upgrades-list"></div>
    </div>
    <div id="offline-popup" class="offline-popup hidden">
    <div class="offline-box">
        <h2>While you were away 💖</h2>
        <p id="offline-amount">+0 Hearts</p>
        <button onclick="closeOfflinePopup()">Continue</button>
    </div>
</div>

    <script>
      
        let score = 0;
        let heartsPerClick = 1;
        let heartsPerSecond = 0;
        let totalClicks = 0;
        let currentTitleIndex = 0;
        let gameEnded = false;

        const upgrades = [
            { id: 'u1', name: "Think about Orian", desc: "+1 heart/sec", baseCost: 15, cost: 15, power: 1, count: 0, max: 100},
            { id: 'u2', name: "Send a text", desc: "+5 hearts/sec", baseCost: 100, cost: 100, power: 5, count: 0, max: 20},
            { id: 'u3', name: "Hold hands", desc: "+25 hearts/sec", baseCost: 1100, cost: 1100, power: 25, count: 0, max: 4},
            { id: 'u4', name: "Cuddles", desc: "+100 hearts/sec", baseCost: 12000, cost: 12000, power: 100, count: 0, max : 1},
            { id: 'u5', name: "Kisses", desc: "Click power x2", baseCost: 500, cost: 500, type: 'click', multiplier: 2, count: 0 }
        ];
        const titles = [
        { min: 0, label: "Just a friend", bonus: 0 },
        { min: 100, label: "Crush", bonus: 2 },
        { min: 500, label: "Lover", bonus: 3 },
        { min: 2000, label: "Obsessed", bonus: 5 },
        { min: 10000, label: "Soulmate", bonus: 10 },
        { min: 50000, label: "True Chickenron", end: true }   
        ];
        
        function updateTitle() {
    const titleEl = document.getElementById('score-title');

    if (gameEnded) {
        titleEl.innerText = "True Chickenron - unlocked secret page";
        return;
    }

    let newIndex = currentTitleIndex;

    for (let i = 0; i < titles.length; i++) {
        if (score >= titles[i].min) newIndex = i;
    }

    if (newIndex > currentTitleIndex) {
        for (let i = currentTitleIndex + 1; i <= newIndex; i++) {
            const t = titles[i];

           if (t.end) {
    endGame();
    return;
}

            heartsPerClick += (t.bonus || 0);
            heartsPerSecond += (t.bonus || 0);
        }

        currentTitleIndex = newIndex;
        calculateHPS();
    }

    titleEl.innerText = titles[currentTitleIndex].label;
}

    


        const scoreEl = document.getElementById('score');
        const hpsEl = document.getElementById('hps');
        const clickerEl = document.getElementById('clicker');
        const upgradesListEl = document.getElementById('upgrades-list');
        
        function saveGame() {
        const saveData = {
        score: score,
        heartsPerClick: heartsPerClick,
        upgrades: upgrades.map(u => ({ count: u.count, cost: u.cost })),
        lastSaved: Date.now() // 👈 ADD THIS
    };
    localStorage.setItem('yas_clicker_save', JSON.stringify(saveData));
}

        function loadGame() {
            if (gameEnded) return;
    const data = localStorage.getItem('yas_clicker_save');

    if (data) {
        const parsed = JSON.parse(data);

        score = parsed.score || 0;
        heartsPerClick = parsed.heartsPerClick || 1;

        if (parsed.upgrades) {
            parsed.upgrades.forEach((savedU, index) => {
                if (upgrades[index]) {
                    upgrades[index].count = savedU.count;
                    upgrades[index].cost = savedU.cost;
                }
            });
        }

        calculateHPS();

        if (parsed.lastSaved) {
            const now = Date.now();
            const maxOffline = 60 * 60 * 8;
            const secondsPassed = Math.min((now - parsed.lastSaved) / 1000, maxOffline);

            const offlineEarnings = secondsPassed * heartsPerSecond;
            score += offlineEarnings;

            if (offlineEarnings > 1) {
                showOfflinePopup(offlineEarnings);
            }

            saveGame();
        }
    }

    updateUI();
}


        function checkDailyLogin() {
            const lastLogin = localStorage.getItem('yas_last_login');
            const today = new Date().toDateString();
            if (lastLogin !== today) {
                localStorage.setItem('yas_last_login', today);
                alert(`Welcome back beautiful! ♡`);
                saveGame();
            }
        }

        function calculateHPS() {
            heartsPerSecond = 0;
            upgrades.forEach(u => {
                if (!u.type) heartsPerSecond += (u.power * u.count);
            });
            hpsEl.innerText = heartsPerSecond.toLocaleString();
        }

        function updateUI() {
            scoreEl.innerText = Math.floor(score).toLocaleString();
            updateTitle();
            upgradesListEl.innerHTML = '';
            upgrades.forEach((u, i) => {
                const isUnlocked = i === 0 || upgrades[i - 1].count > 0;
                const isMaxed = u.max !== undefined && u.count >= u.max;
                const canAfford = score >= u.cost && isUnlocked && !isMaxed;
                const div = document.createElement('div');
                div.className = `upgrade-item ${canAfford ? '' : 'disabled'}`;

                let lockedText = '';

                if (!isUnlocked) {
                div.style.opacity = "0.2";
                lockedText = `<p style="font-size:0.7rem;color:#666;">🔒 Locked</p>`;
                }

                div.innerHTML = `
                <h3>${u.name}</h3>
                <p>Lvl ${u.count}</p>
                <div class="upgrade-cost">${Math.floor(u.cost).toLocaleString()} ♥</div>
                ${lockedText}
                `;
                div.addEventListener('pointerdown', () => buyUpgrade(i));
                upgradesListEl.appendChild(div);
                if (canAfford) {
                div.style.boxShadow = "0 0 10px rgba(232,64,106,0.6)";
}
            });
            updateProgressBar();
        }

       function buyUpgrade(index) {
        if (gameEnded) return;
    const u = upgrades[index];

    const isUnlocked = index === 0 || upgrades[index - 1].count > 0;

    if (!isUnlocked) return;

    // 🔒 MAX CHECK
    if (u.max !== undefined && u.count >= u.max) return;

    if (score >= u.cost) {
        navigator.vibrate?.(10);

        score -= u.cost;
        u.count++;

        if (u.type === 'click') heartsPerClick *= u.multiplier;

        u.cost = u.cost * 1.15;

        calculateHPS();
        updateUI();

        setTimeout(saveGame, 0);
    }
}

        clickerEl.addEventListener('pointerdown', (e) => {
    doClick(e.clientX, e.clientY);
});

        function doClick(x, y) {
            if (gameEnded) return;
            score += heartsPerClick;
            totalClicks++;
            updateUI();
            createFloatingText(`+${heartsPerClick.toLocaleString()}`, x, y);
        }

        setInterval(() => {
            if (heartsPerSecond > 0) {
                score += (heartsPerSecond / 10);
                updateUI();
            }
        }, 100);

        setInterval(saveGame, 5000);

        const canvas = document.getElementById('fx-canvas');
        const ctx = canvas.getContext('2d');
        let floatingTexts = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function createFloatingText(text, x, y) {
            floatingTexts.push({
                text: text,
                x: x + (Math.random() * 40 - 20),
                y: y,
                alpha: 1,
                vy: -2 - Math.random()
            });
        }

        function renderFX() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.font = "bold 24px 'Playfair Display'";
            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                let ft = floatingTexts[i];
                ft.y += ft.vy;
                ft.alpha -= 0.02;
                ctx.fillStyle = `rgba(232, 64, 106, ${ft.alpha})`;
                ctx.fillText(ft.text, ft.x, ft.y);
                if (ft.alpha <= 0) floatingTexts.splice(i, 1);
            }
            requestAnimationFrame(renderFX);
        }
        renderFX();
        const pc = document.getElementById('petals');
        const ps = ['🌸','❤️','✨'];
        function sp() {
            if(document.hidden) return;
            const p = document.createElement('div'); p.className = 'petal';
            p.textContent = ps[Math.floor(Math.random() * ps.length)];
            p.style.left = Math.random() * 100 + 'vw';
            p.style.fontSize = (0.7 + Math.random() * 1.1) + 'rem';
            p.style.animationDuration = (7 + Math.random() * 9) + 's';
            p.style.animationDelay = (Math.random() * 3) + 's';
            pc.appendChild(p); setTimeout(() => p.remove(), 16000);
        }
        setInterval(sp, 1000);
        for (let i = 0; i < 6; i++) setTimeout(sp, i * 400);
        
        window.onload = () => {
    loadGame();
    checkDailyLogin();
};
        function showOfflinePopup(amount) {
    const popup = document.getElementById('offline-popup');
    const text = document.getElementById('offline-amount');

    text.innerText = `+${Math.floor(amount).toLocaleString()} Hearts`;
    popup.classList.remove('hidden');
}

function closeOfflinePopup() {
    document.getElementById('offline-popup').classList.add('hidden');
}

function updateProgressBar() {
    const fill = document.getElementById('progress-fill');

    const current = titles[currentTitleIndex];
    const next = titles[currentTitleIndex + 1];

    if (!next) {
        fill.style.width = "100%";
        return;
    }

    const progress = (score - current.min) / (next.min - current.min);
    fill.style.width = Math.max(0, Math.min(1, progress)) * 100 + "%";
}
function endGame() {
    if (gameEnded) return;

    gameEnded = true;

    heartsPerClick = 0;
    heartsPerSecond = 0;

    localStorage.setItem("secret_unlocked", "true");

    updateUI();
}
    </script>
</body>
</html>
